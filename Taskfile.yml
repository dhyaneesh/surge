version: "3"

vars:
  UV: "{{.ROOT_DIR}}/.tools/bin/uv"
  PREFLIGHT: "{{.ROOT_DIR}}/scripts/verification-preflight.sh"

env:
  TMPDIR: /tmp

tasks:
  bootstrap:
    cmds:
      - ./scripts/bootstrap.sh

  format:
    requires:
      vars: [FILES]
    cmds:
      - "{{.PREFLIGHT}} format"
      - "{{.UV}} run --locked ruff format {{.FILES}}"

  format:check:
    cmds:
      - "{{.PREFLIGHT}} format:check"
      - "{{.UV}} run --locked ruff format --check ."

  lint:
    cmds:
      - "{{.PREFLIGHT}} lint"
      - "{{.UV}} run --locked ruff check ."

  lint:online-boutique:
    desc: Lint the Online Boutique adapter and its focused tests
    cmds:
      - "{{.PREFLIGHT}} lint:online-boutique"
      - "{{.UV}} run --locked ruff check testbeds/adapters/online_boutique.py testbeds/environments/online_boutique.py tests/unit/test_online_boutique_adapter.py tests/contract/test_online_boutique_adapter_contract.py"

  typecheck:
    cmds:
      - "{{.PREFLIGHT}} typecheck"
      - "{{.UV}} run --locked pyright"

  test:unit:
    cmds:
      - "{{.PREFLIGHT}} test:unit"
      - "{{.UV}} run --locked --no-sync python -m tools.verification_harness suite test:unit tests/unit"
      - "{{.UV}} run --locked pytest tests/unit"

  test:contract:
    cmds:
      - "{{.PREFLIGHT}} test:contract"
      - "{{.UV}} run --locked --no-sync python -m tools.verification_harness suite test:contract tests/contract"
      - "{{.UV}} run --locked pytest tests/contract"

  test:integration:
    cmds:
      - "{{.PREFLIGHT}} test:integration"
      - "{{.UV}} run --locked --no-sync python -m tools.verification_harness suite test:integration tests/integration"
      - "{{.UV}} run --locked pytest tests/integration"

  test:architecture:
    desc: Enforce Guardian production architecture boundaries
    cmds:
      - "{{.PREFLIGHT}} test:architecture"
      - "{{.UV}} run --locked --no-sync python -m tools.verification_harness suite test:architecture tests/architecture"
      - "{{.UV}} run --locked pytest tests/architecture"

  mcp:signoz:check:
    desc: Check the optional SigNoz MCP architectural boundary without loading MCP
    cmds:
      - "{{.PREFLIGHT}} mcp:signoz:check"
      - task: test:architecture

  mcp:signoz:smoke:
    desc: Reserved integration-only SigNoz MCP smoke target; no client is implemented yet
    cmds:
      - "{{.PREFLIGHT}} mcp:signoz:smoke"
      - task: test:integration

  diagnostics:signoz:
    desc: Reserved integration-only post-verdict SigNoz diagnostic target; no client is implemented yet
    cmds:
      - "{{.PREFLIGHT}} diagnostics:signoz"
      - task: test:integration

  test:scenario-schema:
    desc: Validate GuardianScenario v1alpha1, v1alpha2, and explicit migration
    cmds:
      - "{{.PREFLIGHT}} test:scenario-schema"
      - "{{.UV}} run --locked --no-sync python -m tools.verification_harness suite test:scenario-schema tests/unit/test_guardian_scenario_schema.py tests/unit/test_guardian_scenario_v1alpha2.py tests/unit/test_guardian_scenario_upgrade.py"
      - "{{.UV}} run --locked pytest tests/unit/test_guardian_scenario_schema.py tests/unit/test_guardian_scenario_v1alpha2.py tests/unit/test_guardian_scenario_upgrade.py"

  test:scenario-compatibility:
    desc: Validate capability derivation, preflight, environment declarations, and catalog
    cmds:
      - "{{.PREFLIGHT}} test:scenario-compatibility"
      - "{{.UV}} run --locked --no-sync python -m tools.verification_harness suite test:scenario-compatibility tests/unit/test_scenario_compatibility.py tests/unit/test_scenario_catalog.py tests/contract/test_environment_capability_declarations.py"
      - "{{.UV}} run --locked pytest tests/unit/test_scenario_compatibility.py tests/unit/test_scenario_catalog.py tests/contract/test_environment_capability_declarations.py"

  test:scenarios:
    desc: Run all environment-neutral scenario contract checks
    cmds:
      - "{{.PREFLIGHT}} test:scenarios"
      - "{{.UV}} run --locked --no-sync python -m tools.verification_harness suite test:scenarios tests/unit/test_guardian_scenario_schema.py tests/unit/test_guardian_scenario_v1alpha2.py tests/unit/test_guardian_scenario_upgrade.py tests/unit/test_critical_scenario_pack.py tests/unit/test_scenario_compatibility.py tests/unit/test_scenario_catalog.py tests/unit/test_scenario_execution.py tests/unit/test_scenario_matrix.py tests/contract/test_environment_capability_declarations.py tests/contract/test_scenario_execution_contract.py tests/architecture"
      - "{{.UV}} run --locked pytest tests/unit/test_guardian_scenario_schema.py tests/unit/test_guardian_scenario_v1alpha2.py tests/unit/test_guardian_scenario_upgrade.py tests/unit/test_critical_scenario_pack.py tests/unit/test_scenario_compatibility.py tests/unit/test_scenario_catalog.py tests/unit/test_scenario_execution.py tests/unit/test_scenario_matrix.py tests/contract/test_environment_capability_declarations.py tests/contract/test_scenario_execution_contract.py tests/architecture"

  test:testbeds-unit:
    cmds:
      - "{{.PREFLIGHT}} test:testbeds-unit"
      - "{{.UV}} run --locked --no-sync python -m tools.verification_harness suite test:testbeds-unit tests/unit/test_otel_demo_adapter.py tests/unit/test_aws_retail_adapter.py tests/unit/test_online_boutique_adapter.py tests/unit/test_argo_rollouts_adapter.py tests/unit/test_keda_rabbitmq_adapter.py tests/unit/test_environment_adapter_contract.py tests/unit/test_guardian_scenario_schema.py tests/unit/test_guardian_scenario_v1alpha2.py tests/unit/test_guardian_scenario_upgrade.py tests/unit/test_critical_scenario_pack.py tests/unit/test_scenario_compatibility.py tests/unit/test_scenario_catalog.py"
      - "{{.UV}} run --locked pytest tests/unit/test_otel_demo_adapter.py tests/unit/test_aws_retail_adapter.py tests/unit/test_online_boutique_adapter.py tests/unit/test_argo_rollouts_adapter.py tests/unit/test_keda_rabbitmq_adapter.py tests/unit/test_environment_adapter_contract.py tests/unit/test_guardian_scenario_schema.py tests/unit/test_guardian_scenario_v1alpha2.py tests/unit/test_guardian_scenario_upgrade.py tests/unit/test_critical_scenario_pack.py tests/unit/test_scenario_compatibility.py tests/unit/test_scenario_catalog.py"

  test:testbeds-contract:
    cmds:
      - "{{.PREFLIGHT}} test:testbeds-contract"
      - "{{.UV}} run --locked --no-sync python -m tools.verification_harness suite test:testbeds-contract tests/contract/test_otel_demo_adapter_contract.py tests/contract/test_aws_retail_adapter_contract.py tests/contract/test_online_boutique_adapter_contract.py tests/contract/test_argo_rollouts_adapter_contract.py tests/contract/test_keda_rabbitmq_adapter_contract.py tests/contract/test_environment_capability_declarations.py"
      - "{{.UV}} run --locked pytest tests/contract/test_otel_demo_adapter_contract.py tests/contract/test_aws_retail_adapter_contract.py tests/contract/test_online_boutique_adapter_contract.py tests/contract/test_argo_rollouts_adapter_contract.py tests/contract/test_keda_rabbitmq_adapter_contract.py tests/contract/test_environment_capability_declarations.py"

  test:policy:
    cmds:
      - "{{.PREFLIGHT}} test:policy"

  test:replay:
    cmds:
      - "{{.PREFLIGHT}} test:replay"

  test:replay-deterministic:
    cmds:
      - "{{.PREFLIGHT}} test:replay-deterministic"

  test:security:
    cmds:
      - "{{.PREFLIGHT}} test:security"
      - "{{.UV}} run --locked --no-sync python -m tools.verification_harness suite test:security tests/security"
      - "{{.UV}} run --locked pytest tests/security"

  test:reasoner:
    cmds:
      - "{{.PREFLIGHT}} test:reasoner"

  test:keda-scaler:
    cmds:
      - "{{.PREFLIGHT}} test:keda-scaler"

  test:action-controller:
    cmds:
      - "{{.PREFLIGHT}} test:action-controller"

  test:requirements:
    desc: Test requirement-registry validation and rendering
    cmds:
      - "{{.PREFLIGHT}} test:requirements"
      - "{{.UV}} run --locked python -m unittest tests.requirements.test_registry -v"

  test:env:
    requires:
      vars: [ENV]
    cmds:
      - "{{.PREFLIGHT}} test:env"
      - ./scripts/test-environment.sh "{{.ENV}}"

  test:matrix:
    cmds:
      - "{{.PREFLIGHT}} test:matrix"
      - ./scripts/test-matrix.sh

  requirements:render:
    desc: Regenerate requirement coverage and dependency graph
    cmds:
      - "{{.PREFLIGHT}} requirements:render"
      - "{{.UV}} run --locked python -m tools.requirements_registry render"

  requirements:check:
    desc: Validate requirement traceability and generated artifacts
    cmds:
      - "{{.PREFLIGHT}} requirements:check"
      - "{{.UV}} run --locked python -m tools.requirements_registry check"

  final:
    cmds:
      - "{{.PREFLIGHT}} aggregate final"
      - task: format:check
      - task: lint
      - task: typecheck
      - task: test:unit
      - task: test:contract
      - task: test:integration
      - task: test:security
      - task: test:replay
      - task: test:matrix
      - task: requirements:check
