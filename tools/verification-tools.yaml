schema_version: 1

platform:
  os: linux
  architecture: amd64

host_prerequisites:
  - bash
  - curl
  - tar

sha256_utilities:
  required: 1
  any_of:
    - command: sha256sum
      arguments: []
    - command: shasum
      arguments: [-a, "256"]

tools:
  task:
    version: 3.52.0
    url: https://github.com/go-task/task/releases/download/v3.52.0/task_linux_amd64.tar.gz
    sha256: 02c679ffae53dca791804847d78b31731615894e292948397c971c87ac9e95bd
  uv:
    version: 0.11.31
    url: https://github.com/astral-sh/uv/releases/download/0.11.31/uv-x86_64-unknown-linux-gnu.tar.gz
    sha256: 8cc1cd82d434ec565376f98bd938d4b715b5791a80ff2d3aa78821cf85091b4b

python_commands:
  pyright: pyright
  pytest: pytest
  ruff: ruff

python_libraries:
  pydantic: pydantic
  yaml: pyyaml
  yaml_typing: types-pyyaml

# A baseline capability is tracked by the harness but is not yet implemented
# and therefore must not be treated as an executable prerequisite.
capabilities:
  tooling: {status: active}
  python: {status: active}
  requirements: {status: active}
  go: {status: baseline}
  node: {status: baseline}
  buf: {status: baseline}
  policy: {status: baseline}
  kubernetes: {status: baseline}
  environment: {status: baseline}

# Dependencies name executable prerequisites. Capabilities describe the checks
# exposed by the task and are consumed by the verification harness.
targets:
  bootstrap: {dependencies: [], capabilities: [tooling]}
  format: {dependencies: [task, uv, ruff], capabilities: [python, go, node]}
  format:check: {dependencies: [task, uv, ruff], capabilities: [python, go, node]}
  lint: {dependencies: [task, uv, ruff], capabilities: [python, go, node]}
  lint:online-boutique: {dependencies: [task, uv, ruff], capabilities: [python]}
  typecheck: {dependencies: [task, uv, pyright], capabilities: [python, go, node]}
  test:unit: {dependencies: [task, uv, pytest], capabilities: [python, go, node]}
  test:contract: {dependencies: [task, uv, pytest], capabilities: [python, buf, policy]}
  test:integration: {dependencies: [task, uv, pytest], capabilities: [python]}
  test:architecture: {dependencies: [task, uv], capabilities: [python]}
  test:testbeds-unit: {dependencies: [task, uv, pytest], capabilities: [python]}
  test:testbeds-contract: {dependencies: [task, uv, pytest], capabilities: [python]}
  test:policy: {dependencies: [task], capabilities: [policy]}
  test:replay: {dependencies: [task, uv, pytest], capabilities: [python]}
  test:replay-deterministic: {dependencies: [task, uv, pytest], capabilities: [python]}
  test:security: {dependencies: [task, uv, pytest], capabilities: [python, go, node]}
  test:reasoner: {dependencies: [task, uv, pytest], capabilities: [python]}
  test:keda-scaler: {dependencies: [task], capabilities: [go]}
  test:action-controller: {dependencies: [task], capabilities: [go]}
  test:requirements: {dependencies: [task, uv], capabilities: [requirements]}
  test:env: {dependencies: [task], capabilities: [environment, kubernetes]}
  test:matrix: {dependencies: [task], capabilities: [environment, kubernetes]}
  requirements:render: {dependencies: [task, uv], capabilities: [requirements]}
  requirements:check: {dependencies: [task, uv], capabilities: [requirements]}
  final: {dependencies: [task], capabilities: [tooling, python, requirements, go, node, buf, policy, kubernetes, environment]}
