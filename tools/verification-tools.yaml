schema_version: 1

platform:
  os: linux
  architecture: amd64

host_prerequisites:
  - bash
  - curl
  - tar

registered_environments:
  - otel-demo
  - aws-retail
  - online-boutique
  - argo-rollouts
  - keda-rabbitmq

sha256_utilities:
  required: 1
  any_of:
    - command: sha256sum
      arguments: []
    - command: shasum
      arguments: [-a, "256"]

tools:
  task:
    version: 3.52.0
    url: https://github.com/go-task/task/releases/download/v3.52.0/task_linux_amd64.tar.gz
    sha256: 02c679ffae53dca791804847d78b31731615894e292948397c971c87ac9e95bd
  uv:
    version: 0.11.31
    url: https://github.com/astral-sh/uv/releases/download/0.11.31/uv-x86_64-unknown-linux-gnu.tar.gz
    sha256: 8cc1cd82d434ec565376f98bd938d4b715b5791a80ff2d3aa78821cf85091b4b

python_commands:
  pyright: pyright
  pytest: pytest
  ruff: ruff

python_libraries:
  pydantic: pydantic
  yaml: pyyaml
  yaml_typing: types-pyyaml

# Baseline suites are tracked without becoming executable prerequisites. This
# lets preflight report the absent target instead of attempting a missing tool.
capabilities:
  bootstrap: {availability: active}
  format: {availability: active}
  format:check: {availability: active}
  lint: {availability: active}
  lint:online-boutique: {availability: active}
  typecheck: {availability: active}
  test:unit: {availability: active}
  test:contract: {availability: active}
  test:integration: {availability: baseline, reason: no tests are configured}
  test:architecture: {availability: active}
  mcp:signoz:check: {availability: active}
  mcp:signoz:smoke: {availability: baseline, reason: no tests are configured}
  diagnostics:signoz: {availability: baseline, reason: no tests are configured}
  test:scenario-schema: {availability: active}
  test:scenario-compatibility: {availability: active}
  test:scenarios: {availability: active}
  test:testbeds-unit: {availability: active}
  test:testbeds-contract: {availability: active}
  test:policy: {availability: baseline, reason: no tests are configured}
  test:replay: {availability: baseline, reason: no tests are configured}
  test:replay-deterministic: {availability: baseline, reason: no tests are configured}
  test:security: {availability: baseline, reason: no tests are configured}
  test:reasoner: {availability: baseline, reason: no tests are configured}
  test:keda-scaler: {availability: baseline, reason: no tests are configured}
  test:action-controller: {availability: baseline, reason: no tests are configured}
  test:requirements: {availability: active}
  test:env: {availability: active}
  test:matrix: {availability: baseline, reason: no tests are configured}
  requirements:render: {availability: active}
  requirements:check: {availability: active}
  final: {availability: active}

# Dependencies name executable prerequisites. Capabilities describe the checks
# exposed by the task and are consumed by the verification harness.
targets:
  bootstrap: {dependencies: [], capabilities: [bootstrap]}
  format: {dependencies: [task, uv, ruff], capabilities: [format]}
  format:check: {dependencies: [task, uv, ruff], capabilities: [format:check]}
  lint: {dependencies: [task, uv, ruff], capabilities: [lint]}
  lint:online-boutique: {dependencies: [task, uv, ruff], capabilities: [lint:online-boutique]}
  typecheck: {dependencies: [task, uv, pyright], capabilities: [typecheck]}
  test:unit: {dependencies: [task, uv, pytest], capabilities: [test:unit]}
  test:contract: {dependencies: [task, uv, pytest], capabilities: [test:contract]}
  test:integration: {dependencies: [], capabilities: [test:integration]}
  test:architecture: {dependencies: [task, uv, pytest], capabilities: [test:architecture]}
  mcp:signoz:check:
    dependencies: [task, uv, pytest]
    capabilities: [mcp:signoz:check]
    children: [test:architecture]
  mcp:signoz:smoke:
    dependencies: []
    capabilities: [mcp:signoz:smoke]
    children: [test:integration]
  diagnostics:signoz:
    dependencies: []
    capabilities: [diagnostics:signoz]
    children: [test:integration]
  test:scenario-schema: {dependencies: [task, uv, pytest], capabilities: [test:scenario-schema]}
  test:scenario-compatibility: {dependencies: [task, uv, pytest], capabilities: [test:scenario-compatibility]}
  test:scenarios: {dependencies: [task, uv, pytest], capabilities: [test:scenarios]}
  test:testbeds-unit: {dependencies: [task, uv, pytest], capabilities: [test:testbeds-unit]}
  test:testbeds-contract: {dependencies: [task, uv, pytest], capabilities: [test:testbeds-contract]}
  test:policy: {dependencies: [], capabilities: [test:policy]}
  test:replay: {dependencies: [], capabilities: [test:replay]}
  test:replay-deterministic: {dependencies: [], capabilities: [test:replay-deterministic]}
  test:security: {dependencies: [], capabilities: [test:security]}
  test:reasoner: {dependencies: [], capabilities: [test:reasoner]}
  test:keda-scaler: {dependencies: [], capabilities: [test:keda-scaler]}
  test:action-controller: {dependencies: [], capabilities: [test:action-controller]}
  test:requirements: {dependencies: [task, uv], capabilities: [test:requirements]}
  test:env: {dependencies: [], capabilities: [test:env]}
  test:matrix:
    dependencies: []
    capabilities: [test:matrix]
    children: [test:env, test:env, test:env, test:env, test:env]
  requirements:render: {dependencies: [task, uv], capabilities: [requirements:render]}
  requirements:check: {dependencies: [task, uv], capabilities: [requirements:check]}
  final:
    dependencies: [task]
    capabilities: [final]
    children:
      - format:check
      - lint
      - typecheck
      - test:unit
      - test:contract
      - test:integration
      - test:security
      - test:replay
      - test:matrix
      - requirements:check
