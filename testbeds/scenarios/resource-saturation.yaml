apiVersion: tests.guardian.io/v1alpha2
kind: GuardianScenario
metadata:
  name: resource-saturation
spec:
  description: Local resource pressure permits scale-up without rollback.
  candidateEnvironments:
  - otel-demo
  - aws-retail
  - online-boutique
  - argo-rollouts
  - keda-rabbitmq
  environmentRequirements:
    capabilities:
    - healthy-baseline
    - resource-pressure
    - dependency-observation
    - horizontal-scaling
    - workflow-observation
    - mutation-observation
    - recovery-observation
  traceability:
    normativeRequirements: []
    acceptanceTests: []
  target:
    serviceSelector:
      role: request-processor
  baseline:
    healthyFor: 5m
  stimulus:
    fault:
      type: high_cpu
      magnitude: 1
  expected:
    incident:
      incidentClass: resource_saturation
      actionable: true
      telemetryQuality: healthy
    evidence:
      supporting:
      - evidenceType: resource-utilization
        subjectRole: request-processor
        freshness: fresh
        tenantRelation: same-tenant
      contradicting:
      - evidenceType: dependency-health
        subjectRole: dependency
        freshness: fresh
        tenantRelation: same-tenant
      requiredFresh:
      - &id002
        evidenceType: recovery-telemetry
        subjectRole: request-processor
        freshness: fresh
        tenantRelation: same-tenant
    actions:
      eligible:
      - &id001
        actionType: scale
        scaleDirection: up
      forbidden:
      - actionType: rollback
      proposed: *id001
    policy:
      decision: approval-required
      failClosed: true
    workflow:
      requiredStates:
      - active
      - assessment
      - closed
      parentCount:
        exact: 1
      proposalCount:
        atMost: 1
      approvalCount:
        atMost: 1
      terminalReason: null
    mutations:
      count:
        atMost: 1
      actions:
      - *id001
    audit:
      events:
      - eventType: observation-recorded
        count:
          atLeast: 1
    safetyGates:
    - post-action-evidence-for-recovery
    recovery:
      contractRef: resource-saturation-recovery
      contractVersion: 1
      registryVersion: critical-pack-v1
      requireFreshTelemetry: true
      evidence:
      - *id002
      conditions:
      - resource-pressure-cleared
      - service-healthy
      minimumPostActionWindows: 1
