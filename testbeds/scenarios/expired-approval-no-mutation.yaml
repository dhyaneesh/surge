apiVersion: tests.guardian.io/v1alpha2
kind: GuardianScenario
metadata:
  name: expired-approval-no-mutation
spec:
  description: Expired approval and replay attempts cannot mutate.
  candidateEnvironments:
  - otel-demo
  - aws-retail
  - online-boutique
  - argo-rollouts
  - keda-rabbitmq
  environmentRequirements:
    capabilities:
    - approval-control
    - workflow-observation
    - mutation-observation
  traceability:
    normativeRequirements:
    - GRD-TTL-003
    - GRD-TTL-005
    acceptanceTests:
    - AT-TTL-001
  target:
    serviceSelector:
      role: request-processor
  baseline:
    healthyFor: 5m
  stimulus:
    approval:
      attemptAfterExpiry: true
  expected:
    incident:
      incidentClass: null
      actionable: false
      telemetryQuality: healthy
    evidence:
      supporting: []
      contradicting: []
      requiredFresh: []
    actions:
      eligible:
      - actionType: rollback
      forbidden: []
      proposed: null
    policy:
      decision: denied
      failClosed: true
    workflow:
      requiredStates:
      - active
      - assessment
      - closed
      parentCount:
        exact: 1
      proposalCount:
        atMost: 1
      approvalCount:
        exact: 0
      terminalReason: approval-expired
    mutations:
      count:
        exact: 0
      actions: []
    audit:
      events:
      - eventType: action-rejected
        count:
          atLeast: 1
    safetyGates:
    - expiry-before-mutation
    recovery: null
