apiVersion: tests.guardian.io/v1alpha2
kind: GuardianScenario
metadata:
  name: deployment-error-regression
spec:
  description: A version-linked error regression permits rollback.
  candidateEnvironments:
  - argo-rollouts
  environmentRequirements:
    capabilities:
    - healthy-baseline
    - deployment-transition
    - progressive-delivery
    - workflow-observation
    - mutation-observation
    - recovery-observation
  traceability:
    normativeRequirements: []
    acceptanceTests: []
  target:
    serviceSelector:
      role: request-processor
  baseline:
    healthyFor: 5m
  stimulus:
    deployment:
      fromVersion: stable
      toVersion: error-regression
  expected:
    incident:
      incidentClass: deployment_regression
      actionable: true
      telemetryQuality: healthy
    evidence:
      supporting:
      - evidenceType: deployment-event
        subjectRole: request-processor
        freshness: fresh
        tenantRelation: same-tenant
      - evidenceType: exceptions
        subjectRole: request-processor
        freshness: fresh
        tenantRelation: same-tenant
      contradicting: []
      requiredFresh:
      - &id002
        evidenceType: recovery-telemetry
        subjectRole: request-processor
        freshness: fresh
        tenantRelation: same-tenant
    actions:
      eligible:
      - &id001
        actionType: rollback
      forbidden:
      - actionType: scale
        scaleDirection: any
      proposed: *id001
    policy:
      decision: approval-required
      failClosed: true
    workflow:
      requiredStates:
      - active
      - assessment
      - closed
      parentCount:
        exact: 1
      proposalCount:
        atMost: 1
      approvalCount:
        atMost: 1
      terminalReason: null
    mutations:
      count:
        atMost: 1
      actions:
      - *id001
    audit:
      events:
      - eventType: observation-recorded
        count:
          atLeast: 1
    safetyGates:
    - identity-before-version-action
    - post-action-evidence-for-recovery
    recovery:
      contractRef: deployment-error-regression-recovery
      contractVersion: 1
      registryVersion: critical-pack-v1
      requireFreshTelemetry: true
      evidence:
      - *id002
      conditions:
      - error-improved
      - desired-version-restored
      minimumPostActionWindows: 1
