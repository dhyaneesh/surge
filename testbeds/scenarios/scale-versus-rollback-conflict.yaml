apiVersion: tests.guardian.io/v1alpha2
kind: GuardianScenario
metadata:
  name: scale-versus-rollback-conflict
spec:
  description: Eligible scale and rollback candidates enter unresolved conflict.
  candidateEnvironments:
  - argo-rollouts
  environmentRequirements:
    capabilities:
    - healthy-baseline
    - load-generation
    - deployment-transition
    - horizontal-scaling
    - progressive-delivery
    - workflow-observation
    - mutation-observation
    - recovery-observation
  traceability:
    normativeRequirements:
    - GRD-ACT-001
    - GRD-ACT-002
    - GRD-ACT-005
    acceptanceTests:
    - AT-ACT-001
  target:
    serviceSelector:
      role: request-processor
  baseline:
    healthyFor: 5m
  stimulus:
    load:
      pattern: sustained
      multiplier: 4
      duration: 10m
    deployment:
      fromVersion: stable
      toVersion: regressed
  expected:
    incident:
      incidentClass: deployment_regression
      actionable: false
      telemetryQuality: healthy
    evidence:
      supporting:
      - evidenceType: load
        subjectRole: request-processor
        freshness: fresh
        tenantRelation: same-tenant
      - evidenceType: deployment-event
        subjectRole: request-processor
        freshness: fresh
        tenantRelation: same-tenant
      contradicting: []
      requiredFresh: []
    actions:
      eligible:
      - actionType: scale
        scaleDirection: up
      - actionType: rollback
      forbidden: []
      proposed: null
    policy:
      decision: denied
      failClosed: true
    workflow:
      requiredStates:
      - active
      - conflict-resolution
      - closed
      parentCount:
        exact: 1
      proposalCount:
        atMost: 1
      approvalCount:
        exact: 0
      terminalReason: conflict-unresolved
    mutations:
      count:
        exact: 0
      actions: []
    audit:
      events:
      - eventType: observation-recorded
        count:
          atLeast: 1
    safetyGates: []
    recovery: null
