apiVersion: tests.guardian.io/v1alpha2
kind: GuardianScenario
metadata:
  name: stale-opa-fail-closed
spec:
  description: An unusable OPA bundle denies every new write.
  candidateEnvironments:
  - otel-demo
  - aws-retail
  - online-boutique
  - argo-rollouts
  - keda-rabbitmq
  environmentRequirements:
    capabilities:
    - policy-bundle-control
    - workflow-observation
    - mutation-observation
  traceability:
    normativeRequirements:
    - GRD-OPA-003
    - GRD-OPA-006
    acceptanceTests:
    - AT-OPA-001
  target:
    serviceSelector:
      role: request-processor
  baseline:
    healthyFor: 5m
  stimulus:
    policyBundle:
      state: fail-closed
  expected:
    incident:
      incidentClass: null
      actionable: false
      telemetryQuality: healthy
    evidence:
      supporting: []
      contradicting: []
      requiredFresh: []
    actions:
      eligible:
      - actionType: rollback
      forbidden: []
      proposed: null
    policy:
      decision: denied
      bundleState: fail-closed
      failClosed: true
      permittedOperations:
      - read-only-investigation
      forbiddenOperations:
      - rollback
      - scale-up
      - scale-down
      - scaler-pause
      - policy-activation
      - approval-issuance
    workflow:
      requiredStates:
      - active
      - assessment
      - closed
      parentCount:
        exact: 1
      proposalCount:
        atMost: 1
      approvalCount:
        exact: 0
      terminalReason: policy-unusable
    mutations:
      count:
        exact: 0
      actions: []
    audit:
      events:
      - eventType: observation-recorded
        count:
          atLeast: 1
    safetyGates:
    - policy-before-mutation
    recovery: null
