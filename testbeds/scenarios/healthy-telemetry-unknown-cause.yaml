apiVersion: tests.guardian.io/v1alpha2
kind: GuardianScenario
metadata:
  name: healthy-telemetry-unknown-cause
spec:
  description: Fresh complete telemetry with no eligible cause remains unknown.
  candidateEnvironments:
  - otel-demo
  environmentRequirements:
    capabilities:
    - healthy-baseline
    - ambiguous-symptom
    - workflow-observation
    - mutation-observation
  traceability:
    normativeRequirements:
    - GRD-CLS-001
    - GRD-CLS-004
    acceptanceTests:
    - AT-CLS-002
  target:
    serviceSelector:
      role: request-processor
  baseline:
    healthyFor: 5m
  stimulus:
    ambiguousSymptom:
      preserveHealthyTelemetry: true
  expected:
    incident:
      incidentClass: unknown
      actionable: false
      telemetryQuality: healthy
    evidence:
      supporting:
      - evidenceType: telemetry-quality
        subjectRole: request-processor
        freshness: fresh
        tenantRelation: same-tenant
      contradicting: []
      requiredFresh: []
    actions:
      eligible: []
      forbidden:
      - actionType: scale
        scaleDirection: any
      - actionType: rollback
      proposed: null
    policy:
      decision: denied
      failClosed: true
    workflow:
      requiredStates:
      - active
      - unknown
      - closed
      parentCount:
        exact: 1
      proposalCount:
        atMost: 1
      approvalCount:
        exact: 0
      terminalReason: null
    mutations:
      count:
        exact: 0
      actions: []
    audit:
      events:
      - eventType: observation-recorded
        count:
          atLeast: 1
    safetyGates: []
    recovery: null
